<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oswaal Books [Questions Banks] 2026 | Class 12</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #070911;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --text-gray: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: white;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* --- Navbar --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; border-bottom: 1px solid var(--border-color);
            background: rgba(7, 9, 17, 0.85); backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-box { background: var(--accent-blue); width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center; }
        .back-nav-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: white; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }

        /* --- Series Header --- */
        .series-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border-color); margin-bottom: 10px; background: rgba(255,255,255,0.01); }
        .series-img { width: 100%; max-width: 250px; aspect-ratio: 3/4; background: #1e293b; border-radius: 20px; margin: 0 auto 30px; overflow: hidden; border: 4px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .series-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .series-title { font-size: 2rem; font-weight: 800; line-height: 1.2; margin-bottom: 15px; }
        .series-desc { color: var(--text-gray); font-size: 14px; max-width: 400px; margin: 0 auto 30px; line-height: 1.6; }

        .status-badges { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .badge { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 12px; font-weight: 600; font-size: 13px; border: 1px solid transparent; }
        .badge.verified { background: rgba(34, 197, 94, 0.1); color: var(--accent-green); border-color: rgba(34, 197, 94, 0.2); }
        .badge.items { background: rgba(59, 130, 246, 0.1); color: var(--accent-blue); border-color: rgba(59, 130, 246, 0.2); }

        /* --- Search Area --- */
        .search-container { padding: 10px 20px 0px; max-width: 500px; margin: 0 auto; text-align: center; }
        .search-wrap { position: relative; width: 100%; margin-bottom: 15px; }
        .search-wrap i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-gray); font-size: 16px; }
        .search-wrap input { width: 100%; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); padding: 16px 20px 16px 55px; border-radius: 15px; color: white; outline: none; font-size: 15px; transition: 0.3s; }
        .search-wrap input:focus { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }

        /* 🔥 NAYA ADDED: Download Method Button Style */
        .method-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            border-radius: 30px;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
            margin-bottom: 25px;
        }
        .method-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-blue);
            color: white;
            transform: translateY(-2px);
        }
        .method-btn i { color: #ef4444; font-size: 14px; }

        /* --- PDF Items List --- */
        .items-container { padding: 0 20px; display: flex; flex-direction: column; gap: 15px; }
        .pdf-item { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; color: white; cursor: default; transition: 0.3s; }
        .pdf-item.hidden { display: none; }
        .item-img { width: 70px; aspect-ratio: 3/4; background: #1e293b; border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); }
        .item-img img { width: 100%; height: 100%; object-fit: cover; }
        .item-details { flex: 1; }
        .item-title { font-size: 1rem; font-weight: 700; margin-bottom: 5px; color: white; }
        .item-pub { color: var(--text-gray); font-size: 12px; display: flex; align-items: center; gap: 5px; margin-bottom: 10px; }
        .item-pub i { color: var(--accent-blue); }
        .tag-pill { display: inline-block; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-gray); font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 15px; text-transform: uppercase; }
        .download-icon { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-blue), #1d4ed8); color: white; display: grid; place-items: center; font-size: 18px; box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3); transition: 0.3s; text-decoration: none; cursor: pointer; }
        .download-icon:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }

    </style>
</head>
<body>

    <nav>
        <div style="display:flex; align-items:center; gap:12px">
            <div class="logo-box"><i class="fa-solid fa-book-open" style="color:white"></i></div>
            <h2 style="font-size: 1.1rem; font-weight: 800;">EBooks Library</h2>
        </div>
        <a href="index.html" class="back-nav-btn"><i class="fa-solid fa-arrow-left"></i> Library</a>
    </nav>

    <div class="series-header">
        <div class="series-img">
            <img src="obqb-image.jpg" alt="Oswaal Books QB">
        </div>
        <h1 class="series-title">Oswaal Books PCMB [Questions Banks] 2026</h1>
        <p class="series-desc">Latest Edition Questions Banks with Complete Solutions & Solved PYQs.</p>
        <div class="status-badges">
            <span class="badge verified"><i class="fa-solid fa-circle-check"></i> Verified Files</span>
            <span class="badge items"><i class="fa-solid fa-folder-open"></i> <span id="itemCount">2</span> PDF Items</span>
        </div>
    </div>

    <div class="search-container">
        <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="subjectSearch" placeholder="Search Books (e.g., 'Maths', 'Oswaal')...">
        </div>
        
        <a href="HOW_TO_DOWNLOAD_VIDEO_LINK" class="method-btn">
            <i class="fa-solid fa-circle-play"></i> Watch Download Method
        </a>
    </div>

    <div class="items-container" id="booksList">
        <div class="pdf-item">
            <div class="item-img"><img src="obmathsqb-image.jpg"></div>
            <div class="item-details">
                <div class="item-title">Maths Question Bank 2026</div>
                <div class="item-pub"><i class="fa-solid fa-bookmark"></i> Oswaal Books</div>
                <span class="tag-pill">MATHS</span>
            </div>
            <a href="MATHS_LINK" class="download-icon"><i class="fa-solid fa-download"></i></a>
        </div>

        <div class="pdf-item">
            <div class="item-img"><img src="https://m.media-amazon.com/images/I/81I35pS4-lL._SL1500_.jpg"></div>
            <div class="item-details">
                <div class="item-title">Chemistry QB 2026</div>
                <div class="item-pub"><i class="fa-solid fa-bookmark"></i> Oswaal Books</div>
                <span class="tag-pill">CHEMISTRY</span>
            </div>
            <a href="CHEM_LINK" class="download-icon"><i class="fa-solid fa-download"></i></a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('subjectSearch');
            const bookItems = document.getElementsByClassName('pdf-item');
            const itemCountBadge = document.getElementById('itemCount');

            searchInput.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase().trim();
                let visibleCount = 0;
                Array.from(bookItems).forEach(item => {
                    const text = item.innerText.toLowerCase();
                    if (text.includes(searchTerm)) {
                        item.classList.remove('hidden');
                        visibleCount++;
                    } else {
                        item.classList.add('hidden');
                    }
                });
                itemCountBadge.textContent = visibleCount;
            });
        });
    </script>

</body>
</html>
